<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - E-Municipality Portal</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/error.css">
</head>
<body>

    <div class="error-wrapper">
        <!-- Grid overlay -->
        <div class="error-grid"></div>

        <!-- Glowing background structures -->
        <div class="glowing-orb orb-1"></div>
        <div class="glowing-orb orb-2"></div>

        <!-- Floating cones warning details -->
        <div class="floating-warning-item item-left">⚠️</div>
        <div class="floating-warning-item item-right">🚧</div>

        <!-- Glass card content panel -->
        <div class="error-card animate-fade-up">
            <!-- Floating particles decoration inside card -->
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>

            <div class="error-illustration" style="margin-bottom: 40px;">
                <!-- Municipality Video-like Animation Scene -->
                <div class="municipal-scene">
                    <div class="skyline">
                        <div class="building b1"></div>
                        <div class="building b2"></div>
                        <div class="building b3"></div>
                    </div>
                    <div class="clouds">
                        <div class="cloud c1"></div>
                        <div class="cloud c2"></div>
                    </div>
                    <div class="road-grid"></div>
                    <div class="barrier-wrapper">
                        <!-- Hazard Lights flashing on top -->
                        <div class="flashing-light fl1"></div>
                        <div class="flashing-light fl2"></div>
                        <!-- Striped Barrier Board -->
                        <div class="barrier-board">
                            <div class="stripe-pattern"></div>
                        </div>
                        <!-- Digital Signboard -->
                        <div class="digital-sign">
                            <span class="sign-text">404</span>
                            <span class="sign-subtext">ROAD CLOSED</span>
                        </div>
                    </div>
                    <!-- Warning Cone bouncing in front -->
                    <div class="municipal-cone">
                        <div class="cone-stripe"></div>
                    </div>
                    <!-- Driving and stopping car -->
                    <div class="animated-car">
                        <div class="car-body">
                            <div class="car-window"></div>
                            <div class="car-wheel wheel-1"></div>
                            <div class="car-wheel wheel-2"></div>
                        </div>
                        <div class="headlight-beam"></div>
                    </div>
                    <!-- Municipal Officer blocking car -->
                    <div class="municipal-officer">
                        <div class="officer-body">
                            <div class="officer-head"></div>
                            <div class="officer-hat"></div>
                            <div class="officer-arm arm-right">
                                <div class="hand-stop-sign">🛑</div>
                            </div>
                        </div>
                    </div>
                    <!-- Road bed at bottom -->
                    <div class="scene-road">
                        <div class="road-line"></div>
                    </div>
                </div>
            </div>

            <h1>Oops! The page you are looking for could not be found.</h1>
            <p>It might have been moved or deleted.</p>

            <div style="display: flex; gap: 16px; justify-content: center; width: 100%; flex-wrap: wrap;">
                <a href="#" id="backToDashboard" class="btn btn-primary" style="padding: 14px 28px; font-size: 0.95rem; box-shadow: 0 0 20px rgba(6, 182, 212, 0.3);">Back to Dashboard</a>
                <a href="index.html" id="backToHome" class="btn btn-outline" style="padding: 14px 28px; font-size: 0.95rem; border: 1px solid var(--border-light); color: var(--text-main) !important; background: white; text-decoration: none;">Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/error.js"></script>
</body>
</html>
