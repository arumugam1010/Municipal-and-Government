<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Create Account - E-Municipality Portal</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-wrapper">
        <div class="auth-container">
            <a href="index.html" class="auth-logo" style="display: flex; align-items: center; justify-content: center; text-decoration: none; gap: 8px;">
                <img src="assets/logo-stackly.webp" alt="Stackly Logo" style="height: 32px; width: auto; object-fit: contain;">
                <span class="logo-text" style="display: flex; flex-direction: column; line-height: 1.1; font-weight: 700; font-size: 0.85rem !important; text-align: left; color: var(--primary); margin: 0;">Municipal <span style="font-size: 0.7rem !important; color: var(--text-muted); font-weight: 500;">& Government</span></span>
            </a>

            <div class="auth-card" style="padding: 40px 32px;">
                <h2>Register Workspace</h2>
                <p class="auth-subtitle">Create a portal account to apply for services, certificates, and track
                    applications.</p>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label" for="regName">Full Name</label>
                        <input type="text" id="regName" class="auth-input" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regEmail">Email Address</label>
                        <input type="email" id="regEmail" class="auth-input" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Register Role</label>
                        <div class="role-cards-grid" id="regRoleCards">
                            <div class="role-card active" data-role="citizen">
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                                </svg>
                                <span>Citizen</span>
                            </div>
                            <div class="role-card" data-role="officer">
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z" />
                                </svg>
                                <span>Officer</span>
                            </div>
                            <div class="role-card" data-role="admin">
                                <svg viewBox="0 0 24 24">
                                    <path
                                        d="M12 2c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2s-2-.9-2-2V4c0-1.1.9-2 2-2zm0 15c.83 0 1.5.67 1.5 1.5S12.83 20 12 20s-1.5-.67-1.5-1.5.67-1.5 1.5-1.5z" />
                                </svg>
                                <span>Admin</span>
                            </div>
                        </div>
                        <input type="hidden" id="regRole" value="citizen">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="regPass">Secure Password</label>
                        <input type="password" id="regPass" class="auth-input" placeholder="••••••••" required>
                    </div>

                    <div class="form-group" style="margin-bottom: 30px;">
                        <label class="form-label" for="regConfirmPass">Confirm Password</label>
                        <input type="password" id="regConfirmPass" class="auth-input" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Create
                        Account</button>
                </form>

                <div class="auth-footer">
                    Already registered? <a href="login.html">Access account</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>

</html>
